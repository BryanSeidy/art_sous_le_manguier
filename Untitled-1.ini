DIRECTION ARTISTIQUE — ART SOUS LE MANGUIER
1. CONCEPT CRÉATIF GLOBAL
Concept :

“L’ombre du manguier comme espace de mémoire vivante”

Idée directrice :

Le site doit donner l’impression d’entrer dans un espace organique, vivant, presque sacré, où les récits flottent, circulent et s’ancrent.

👉 Ce n’est pas un site.
👉 C’est une expérience narrative interactive.

2. UNIVERS VISUEL
Palette chromatique (sensorielle & symbolique)
🌿 Vert profond (#0F2A1D) → nature, enracinement
🟤 Terre chaude (#5C3A21) → mémoire, matière
🟡 Ocre doré (#D6A85C) → transmission, lumière
⚫ Noir doux (#0A0A0A) → profondeur, mystère
⚪ Beige organique (#F5F1E8) → respiration, équilibre

👉 Inspiration : terre, écorce, lumière filtrée sous un arbre

Typographies
Titre : Serif élégante (ex: Canela / Playfair Display)
→ sensation éditoriale, culturelle, musée
Texte : Sans-serif moderne (ex: Inter / Neue Haas Grotesk)
→ lisibilité + contraste contemporain
Accent (optionnel) : style manuscrit subtil
→ effet “parole / récit / oralité”
3. DIRECTION VISUELLE (IMAGES & VIDÉOS)
Style d’images
Portraits bruts d’artistes (regard caméra)
Textures : bois, terre, murs, tissus
Scènes de quartier (vie réelle, non posée)
Jeux d’ombre/lumière (feuillage)
Traitement
Grain léger (cinématographique)
Couleurs désaturées + touches chaudes
Flou artistique subtil (profondeur émotionnelle)
4. EXPÉRIENCE UTILISATEUR (UX IMMERSIVE)
🔥 4.1 HERO — Expérience d’entrée
Effet :
Vidéo fullscreen lente (feuilles, vent, voix off légère)
Texte qui apparaît en fade + blur reveal
Interaction :
Scroll = entrée dans le récit
Son ambiant léger (optionnel)
🌿 4.2 SCROLL STORYTELLING (clé du projet)

👉 Le site doit fonctionner comme un film interactif

Effets clés :
Parallax (avant / arrière-plan)
Texte qui apparaît au scroll (type storytelling Apple)
Sections qui se “révèlent” progressivement
Transitions fluides (fade, scale, mask)
🎭 4.3 SECTIONS IMMERSIVES
À propos
Texte qui apparaît ligne par ligne
Image portrait qui se révèle lentement
Citation flottante (effet “voix intérieure”)
Projets (Archipel des quartiers)

👉 Expérience clé

Carte interactive (quartiers = îles)
Hover = extrait narratif
Click = immersion (vidéo + texte)
Awoula Awoula (conte)
Fond sombre + lumière chaude
Texte animé comme une voix qui se raconte
Sons de nuit / ambiance (optionnel)
Épisodes
Scroll horizontal (type galerie Netflix artistique)
Hover = preview vidéo
Click = immersion fullscreen
5. MICRO-INTERACTIONS (ultra important)
Hover = léger zoom + lumière
Scroll = animation fluide (jamais brutale)
Cursor custom (optionnel → cercle organique)
Boutons → effet “respiration” (scale subtle)
6. ANIMATIONS (STACK RECOMMANDÉ)
Technologies
GSAP (ScrollTrigger) → storytelling scroll
Lenis → smooth scroll
Framer Motion → micro-interactions
Three.js (optionnel) → effets avancés
7. STRUCTURE VISUELLE DU SITE
[ HERO IMMERSIF ]
↓
[ INTRO NARRATIVE ]
↓
[ À PROPOS — storytelling ]
↓
[ PROJETS — expérience interactive ]
↓
[ ÉPISODES — galerie immersive ]
↓
[ IMPACT — émotion + preuves ]
↓
[ PARTICIPER — appel narratif ]
↓
[ FOOTER — signature artistique ]
8. SIGNATURE VISUELLE UNIQUE

👉 Ce qui va différencier ton site :

Effet “Mémoire vivante”
Textes qui apparaissent puis disparaissent légèrement
Superposition de récits (layers)
Sensation de temporalité
9. INSPIRATIONS (niveau Awwwards)
Sites culturels immersifs
Expériences type documentaire interactif
Interfaces éditoriales artistiques
10. EXPÉRIENCE MOBILE (TRÈS IMPORTANT)
Scroll simplifié mais fluide
Animations allégées
Vidéo optimisée (lazy load)
Focus sur lisibilité + émotion
